<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>Campaign Preview</title>
        <link rel="icon" type="image/png" href="assets/client-logo-dark.png">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <header class="header">
            <div class="header-inner">
                <img src="assets/company-logo-light.png" alt="Company Logo" class="logo company-logo"/>
                <h1 id="campaignName" class="campaign-title"></h1>
                <img src="assets/client-logo-light.png" alt="Client Logo" class="logo brand-logo"/>
            </div>
        </header>
        <section class="options">
            <div><span>Select a creative</span> <select id="creativeSelector"></select></div>
            <div class="filter-group" id="sizeFilters"></div>
        </section>
        <div class="controls">
            <button id="reloadAll" title="Reload all banners">
                <i class="material-icons">refresh</i>
            </button>
            <button id="downloadAll" title="Download all banners">
                <i class="material-icons">download</i>
            </button>
            <button id="infoBtn" title="Creative info">
                <i class="material-icons">info</i>
            </button>
            <button id="commentsDashboardBtn" title="All Comments">
                <i class="material-icons">comment</i>
            </button>
        </div>
        <div id="infoModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
            <h3>Banner Details</h3>
            <button id="closeModal">
                <i class="material-icons">close</i>
            </button>
            </div>
            <div id="modalBody"></div>
        </div>
        </div>
        <div id="backupImageModal" class="modal hidden">
            <div class="modal-content backup-image-content">
                <button id="closeBackupImage" class="modal-close">
                    <i class="material-icons">close</i></button>
                <div id="backupBannerName"></div>
                <img id="backupImagePreview" alt="Backup Image Preview" />
            </div>
        </div>

        <div id="qrModal" class="modal hidden">
            <div class="modal-content qrcode-image-content">
                <button id="closeQRcode" class="modal-close">
                    <i class="material-icons">close</i></button>
                <div id="qrBannerName"></div>
                <img id="qrImage" alt="QR Code" />
            </div>
        </div>

        <main id="bannerContainer"></main>
        <button id="backToTop" title="Back to top">
            <i class="material-icons">arrow_upward</i>
        </button>
        
        <!-- Comment Modal -->
        <div id="commentModal" class="modal hidden">
            <div class="modal-content comment-modal">

                <div class="modal-top">
                    <h2>Comments</h2>
                    <!-- <button id="closeCommentModal" class="close-btn">
                        Close
                    </button> -->

                <button id="closeCommentModal" class="modal-close">
                    <i class="material-icons">close</i></button>
                </div>

                <div class="comment-banner-name" id="commentBannerName">
                    Banner Name
                </div>

                <div class="comment-form">

                    <label>Name</label>
                    <input
                        type="text"
                        id="commentName"
                        placeholder="Enter your name"
                    >

                    <label>Comment</label>
                    <textarea
                        id="commentText"
                        rows="4"
                        placeholder="Enter your comment..."
                    ></textarea>

                    <div class="comment-actions">
                        <button id="submitCommentBtn">
                            Submit
                        </button>

                        <button id="clearCommentBtn">
                            Clear
                        </button>
                    </div>

                </div>

                <div class="comment-list" id="commentList">
                    <!-- Comments injected here -->
                     Existing comments
                </div>

            </div>
        </div>
        
        <div id="allCommentsModal" class="modal hidden">

            <div class="modal-content comments-dashboard">

            <div class="modal-header">
                <h2>All Comments</h2>

                <!-- <button id="closeAllComments">
                ✕
                </button> -->
                <button id="closeAllComments" class="modal-close">
                    <i class="material-icons">close</i></button>
            </div>

            <div id="allCommentsList"></div>

            </div>

        </div>

        <footer class="footer">© 2026 All rights reserved.</footer>
        <script src="settings.js"></script>
        <script src="script.js"></script>
    </body>
</html>
